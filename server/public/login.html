<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiSignage · Acceso</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="loginForm">
      <div class="brand"><span class="dot"></span> DigiSignage</div>
      <div class="subtitle">Panel de Administración</div>

      <label for="empresa">Empresa</label>
      <input type="text" id="empresa" autocomplete="organization"
             placeholder="Nombre de tu empresa" />
      <small class="muted">Los super-administradores dejan este campo vacío.</small>

      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" autocomplete="username" required autofocus />

      <label for="password">Contraseña</label>
      <input type="password" id="password" autocomplete="current-password" required />

      <button class="btn block" type="submit">Ingresar</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('error');

    // Destino segun el rol del usuario.
    function destinoPorRol(rol) {
      return rol === 'super_admin' ? '/superadmin.html' : '/dashboard.html';
    }

    // Si ya hay sesion activa, ir directo al panel correspondiente.
    fetch('/api/me').then(async (r) => {
      if (r.ok) {
        const me = await r.json().catch(() => ({}));
        location.href = destinoPorRol(me.rol);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      const empresa = document.getElementById('empresa').value.trim();
      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ empresa, usuario, password }),
        });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          location.href = destinoPorRol(data.rol);
        } else {
          const data = await res.json().catch(() => ({}));
          errorBox.textContent = data.error || 'No se pudo iniciar sesión';
          errorBox.classList.add('show');
        }
      } catch {
        errorBox.textContent = 'Error de conexión con el servidor';
        errorBox.classList.add('show');
      }
    });
  </script>
</body>
</html>
