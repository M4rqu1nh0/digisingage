<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiSignage Player</title>
  <style>
    :root {
      --bg: #000;
      --panel: #0e1320;
      --text: #e6edf3;
      --muted: #8b98a9;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: var(--bg); color: var(--text); overflow: hidden;
      cursor: none;
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
    }

    /* Lienzo fijo de 1920×1080 escalado para llenar la pantalla real (signage):
       el diseño se ve idéntico en cualquier resolución; si la pantalla no es
       16:9 aparecen barras negras (no se deforma). */
    #stage {
      position: absolute; top: 50%; left: 50%;
      width: 1920px; height: 1080px;
      transform: translate(-50%, -50%);
      transform-origin: center center;
    }
    /* La grilla se configura dinámicamente segun el preset del layout. */
    #app {
      display: grid;
      width: 1920px; height: 1080px;
      gap: 0;
      background: #000;
    }
    .zone { position: relative; overflow: hidden; background: var(--panel); }

    /* ---- Widget: Video ---- */
    .w-video { background: #000; }
    .w-video .player {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain; background: #000;
    }
    .w-video .idle {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      color: #3a4253; font-size: 22px;
    }
    .w-video .idle.show { display: flex; }

    /* ---- Widget: Imágenes (estática / slider) ---- */
    .w-imagenes { background: #000; }
    .w-imagenes .slide {
      position: absolute; inset: 0;
      background-size: contain; background-position: center; background-repeat: no-repeat;
      opacity: 0; transition: opacity 0.8s ease;
    }
    .w-imagenes .slide.show { opacity: 1; }
    .w-imagenes .slider-empty {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      color: #3a4253; font-size: 14px; text-align: center; padding: 12px;
    }
    .w-imagenes .slider-empty.show { display: flex; }

    /* ---- Widget: Reloj ---- */
    .w-reloj {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; background: linear-gradient(180deg, #131a2b, #0c111c);
    }
    .w-reloj .time { font-size: clamp(28px, 4.5vw, 52px); font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .w-reloj .date { font-size: clamp(12px, 1.3vw, 18px); color: var(--muted); text-transform: capitalize; text-align: center; }

    /* ---- Widget: Clima ---- */
    .w-clima {
      display: flex; align-items: center; gap: 24px; padding: 0 28px;
      background: linear-gradient(180deg, #14233c, #0c1422);
    }
    .w-clima .wx-icon { font-size: clamp(36px, 5vw, 64px); line-height: 1; }
    .w-clima .wx-temp { font-size: clamp(30px, 4.5vw, 56px); font-weight: 700; font-variant-numeric: tabular-nums; }
    .w-clima .wx-info { display: flex; flex-direction: column; gap: 2px; }
    .w-clima .wx-city { font-size: clamp(14px, 1.6vw, 22px); font-weight: 600; }
    .w-clima .wx-cond { font-size: clamp(12px, 1.3vw, 18px); color: var(--muted); }
    .w-clima .wx-extra { margin-left: auto; text-align: right; color: var(--muted); font-size: clamp(11px, 1.2vw, 16px); line-height: 1.6; }

    /* ---- Overlay: pantalla sin asignar (muestra el codigo de vinculacion) ---- */
    #pairing-overlay {
      position: fixed; inset: 0; z-index: 100; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; text-align: center; padding: 40px;
      background: radial-gradient(1200px 700px at 50% 30%, #14233c 0%, #060a12 70%);
    }
    #pairing-overlay.show { display: flex; }
    #pairing-overlay .po-title { font-size: 34px; font-weight: 700; }
    #pairing-overlay .po-sub { font-size: 20px; color: var(--muted); max-width: 900px; line-height: 1.5; }
    #pairing-overlay .po-code {
      font-size: 96px; font-weight: 800; letter-spacing: 12px;
      font-variant-numeric: tabular-nums;
      padding: 24px 48px; border-radius: 20px;
      background: rgba(59, 130, 246, 0.12); border: 2px solid var(--accent); color: #fff;
    }
    #pairing-overlay .po-foot { font-size: 16px; color: var(--muted); }

    /* ---- Overlay: vinculada, esperando que el admin configure el contenido ---- */
    #waiting-overlay {
      position: fixed; inset: 0; z-index: 100; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; text-align: center; padding: 40px;
      background: radial-gradient(1200px 700px at 50% 30%, #14233c 0%, #060a12 70%);
    }
    #waiting-overlay.show { display: flex; }
    #waiting-overlay .wo-check {
      width: 104px; height: 104px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px; line-height: 1; color: #fff;
      background: rgba(34, 197, 94, 0.16); border: 3px solid #22c55e;
    }
    #waiting-overlay .wo-title { font-size: 34px; font-weight: 700; }
    #waiting-overlay .wo-sub { font-size: 20px; color: var(--muted); max-width: 900px; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="stage"><div id="app"></div></div>

  <div id="pairing-overlay">
    <div class="po-title">Pantalla sin asignar</div>
    <div class="po-sub">Ingresa este código en el panel de administración
      (Dispositivos → «Vincular pantalla») para asignar esta pantalla a tu empresa.</div>
    <div class="po-code" id="pairingCode">--------</div>
    <div class="po-foot">La pantalla se activará automáticamente al vincularla.</div>
  </div>

  <div id="waiting-overlay">
    <div class="wo-check">✓</div>
    <div class="wo-title">Pantalla vinculada</div>
    <div class="wo-sub">Esperando a que se configure el contenido desde el panel…</div>
  </div>

  <script>
    // ====================================================================
    //  Reproductor por WIDGETS (Electron)
    //  - El servidor define un LAYOUT: un preset de zonas y, en cada zona,
    //    un widget con su config. Llega por IPC ('layout').
    //  - Cada widget se "monta" en su zona y se "destruye" al cambiar el
    //    layout (libera timers / video). El catalogo es extensible.
    //  - El clima sigue llegando por su canal ('weather'); el widget de clima
    //    se suscribe a esas actualizaciones.
    // ====================================================================

    const MEDIA_BASE = 'media://v/'; // protocolo local de videos (main.js)
    const IMG_BASE = 'img://v/';     // protocolo local de imagenes (main.js)

    const app = document.getElementById('app');
    const stage = document.getElementById('stage');

    // Escala el lienzo 1920×1080 para llenar la pantalla real manteniendo la
    // proporción. Así el contenido se ve igual sin importar la resolución del
    // dispositivo (en 1080p el factor es 1; en 720p o 4K escala proporcional).
    function fitStage() {
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      stage.style.transform = `translate(-50%, -50%) scale(${s})`;
    }
    window.addEventListener('resize', fitStage);
    fitStage();

    // Presets: deben coincidir con server/layouts.js (grid CSS + slots).
    const PRESETS = {
      'solo':           { columns: '1fr',       rows: '1fr',       areas: '"a"',          slots: ['a'] },
      'dos-iguales':    { columns: '1fr 1fr',   rows: '1fr',       areas: '"a b"',        slots: ['a', 'b'] },
      'dos-asimetrico': { columns: '2fr 570px', rows: '1fr',       areas: '"a b"',        slots: ['a', 'b'] },
      'cuatro':         { columns: '1fr 400px', rows: '1fr 225px', areas: '"a b" "c d"',  slots: ['a', 'b', 'c', 'd'] },
    };

    // ------------------------- Clima (estado + suscriptores) -------------------------
    let lastWeather = null;
    const weatherSubscribers = new Set();

    function wxCodeInfo(code, isDay) {
      const map = {
        0: ['Despejado', isDay ? '☀️' : '🌙'],
        1: ['Mayormente despejado', isDay ? '🌤️' : '🌙'],
        2: ['Parcialmente nublado', '⛅'],
        3: ['Nublado', '☁️'],
        45: ['Niebla', '🌫️'], 48: ['Niebla', '🌫️'],
        51: ['Llovizna', '🌦️'], 53: ['Llovizna', '🌦️'], 55: ['Llovizna', '🌦️'],
        56: ['Llovizna helada', '🌧️'], 57: ['Llovizna helada', '🌧️'],
        61: ['Lluvia', '🌧️'], 63: ['Lluvia', '🌧️'], 65: ['Lluvia fuerte', '🌧️'],
        66: ['Lluvia helada', '🌧️'], 67: ['Lluvia helada', '🌧️'],
        71: ['Nieve', '🌨️'], 73: ['Nieve', '🌨️'], 75: ['Nieve fuerte', '🌨️'], 77: ['Granizo', '🌨️'],
        80: ['Chubascos', '🌦️'], 81: ['Chubascos', '🌦️'], 82: ['Chubascos fuertes', '⛈️'],
        85: ['Chubascos de nieve', '🌨️'], 86: ['Chubascos de nieve', '🌨️'],
        95: ['Tormenta', '⛈️'], 96: ['Tormenta con granizo', '⛈️'], 99: ['Tormenta con granizo', '⛈️'],
      };
      return map[code] || ['—', '🌡️'];
    }

    function applyWeather(w) {
      if (!w) return;
      lastWeather = w;
      weatherSubscribers.forEach((fn) => { try { fn(w); } catch {} });
    }

    // ------------------------- Catalogo de widgets -------------------------
    // Cada factory monta el widget en `zone` y devuelve { destroy() }.

    function createVideo(zone, config) {
      zone.classList.add('w-video');
      zone.innerHTML = '<video class="player" autoplay playsinline></video><div class="idle">Esperando contenido…</div>';
      const video = zone.querySelector('.player');
      const idle = zone.querySelector('.idle');
      const playlist = Array.isArray(config.items) ? config.items.slice() : [];
      let vIndex = 0;

      const setIdle = (on) => idle.classList.toggle('show', on);

      function playCurrent() {
        if (!playlist.length) { setIdle(true); return; }
        if (vIndex >= playlist.length) vIndex = 0;
        setIdle(false);
        video.src = MEDIA_BASE + encodeURIComponent(playlist[vIndex]);
        video.muted = false; video.volume = 1.0;
        video.load();
        const p = video.play();
        if (p && p.catch) p.catch(() => {
          video.muted = true;
          const p2 = video.play();
          if (p2 && p2.catch) p2.catch((e) => console.warn('play() bloqueado:', e.message));
        });
      }
      function vNext() { vIndex = (vIndex + 1) % Math.max(playlist.length, 1); playCurrent(); }

      const onEnded = () => vNext();
      const onError = () => { console.warn('Error de video -> siguiente'); setTimeout(vNext, 1500); };
      video.addEventListener('ended', onEnded);
      video.addEventListener('error', onError);

      let vLastTime = 0, vStalled = 0;
      const stall = setInterval(() => {
        if (!playlist.length || video.paused || video.ended) return;
        if (video.currentTime === vLastTime) { if (++vStalled >= 5) { vStalled = 0; vNext(); } }
        else { vStalled = 0; vLastTime = video.currentTime; }
      }, 2000);

      if (!playlist.length) setIdle(true); else { vIndex = 0; playCurrent(); }

      return {
        destroy() {
          clearInterval(stall);
          video.removeEventListener('ended', onEnded);
          video.removeEventListener('error', onError);
          try { video.pause(); video.removeAttribute('src'); video.load(); } catch {}
        },
      };
    }

    function createImagenes(zone, config) {
      zone.classList.add('w-imagenes');
      zone.innerHTML = '<div class="slide a"></div><div class="slide b"></div><div class="slider-empty">Sin imágenes asignadas</div>';
      const slideA = zone.querySelector('.slide.a');
      const slideB = zone.querySelector('.slide.b');
      const empty = zone.querySelector('.slider-empty');
      const items = Array.isArray(config.items) ? config.items : [];
      const modo = config.modo === 'estatica' ? 'estatica' : 'slider';
      let front = slideA, timer = null, destroyed = false;

      // Comprueba que la imagen cargue (esté descargada) antes de mostrarla, así
      // nunca se intenta pintar un archivo que aún se está descargando.
      function preload(file) {
        return new Promise((resolve) => {
          const im = new Image();
          im.onload = () => resolve(true);
          im.onerror = () => resolve(false);
          // cache-buster: re-verifica disponibilidad en cada reintento.
          im.src = `${IMG_BASE}${encodeURIComponent(file)}?t=${Date.now()}`;
        });
      }
      function setBg(file) {
        const back = front === slideA ? slideB : slideA;
        back.style.backgroundImage = `url("${IMG_BASE}${encodeURIComponent(file)}")`;
        back.classList.add('show');
        front.classList.remove('show');
        front = back;
      }
      function clearTimer() { if (timer) { clearTimeout(timer); timer = null; } }

      // Muestra items[i] si ya está disponible; si no, mantiene la imagen actual
      // y reintenta pronto. Avanza al siguiente solo tras mostrar el actual.
      async function showAt(i) {
        if (destroyed) return;
        const ok = await preload(items[i].file);
        if (destroyed) return;
        if (ok) setBg(items[i].file);
        clearTimer();
        const single = modo !== 'slider' || items.length <= 1;
        if (ok) {
          if (single) return; // estática o 1 imagen: nada que rotar
          const secs = Number(items[i].segundos) > 0 ? Number(items[i].segundos) : 6;
          timer = setTimeout(() => showAt((i + 1) % items.length), secs * 1000);
        } else {
          timer = setTimeout(() => showAt(i), 3000); // aún descargando: reintenta
        }
      }

      if (!items.length) {
        empty.classList.add('show');
      } else {
        empty.classList.remove('show');
        showAt(0);
      }

      return { destroy() { destroyed = true; clearTimer(); } };
    }

    function createReloj(zone) {
      zone.classList.add('w-reloj');
      zone.innerHTML = '<div class="time">--:--:--</div><div class="date">—</div>';
      const t = zone.querySelector('.time');
      const d = zone.querySelector('.date');
      function tick() {
        const now = new Date();
        t.textContent = now.toLocaleTimeString('es');
        d.textContent = now.toLocaleDateString('es', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      }
      tick();
      const iv = setInterval(tick, 1000);
      return { destroy() { clearInterval(iv); } };
    }

    function createClima(zone) {
      zone.classList.add('w-clima');
      zone.innerHTML = `
        <div class="wx-icon">🌡️</div>
        <div class="wx-temp">--°</div>
        <div class="wx-info">
          <div class="wx-city">—</div>
          <div class="wx-cond">Cargando clima…</div>
        </div>
        <div class="wx-extra"></div>`;
      const q = (c) => zone.querySelector(c);
      function render(w) {
        if (!w) return;
        const [cond, icon] = wxCodeInfo(w.code, w.isDay);
        q('.wx-icon').textContent = icon;
        q('.wx-temp').textContent = (w.temp == null || Number.isNaN(w.temp) ? '--' : w.temp) + '°';
        q('.wx-city').textContent = w.city || '';
        q('.wx-cond').textContent = cond;
        const extra = [];
        if (w.max != null && w.min != null) extra.push(`Máx ${w.max}° · Mín ${w.min}°`);
        const hw = [];
        if (w.humidity != null) hw.push(`Humedad ${w.humidity}%`);
        if (w.wind != null) hw.push(`Viento ${w.wind} km/h`);
        if (hw.length) extra.push(hw.join(' · '));
        q('.wx-extra').innerHTML = extra.join('<br>');
      }
      if (lastWeather) render(lastWeather);
      weatherSubscribers.add(render);
      return { destroy() { weatherSubscribers.delete(render); } };
    }

    const WIDGETS = {
      video: createVideo,
      imagenes: createImagenes,
      reloj: createReloj,
      clima: createClima,
    };

    // ------------------------- Aplicacion del layout -------------------------
    let instances = [];
    let layoutSig = '';

    function applyLayout(layout) {
      if (!layout || !layout.preset) return;
      const sig = JSON.stringify(layout);
      if (sig === layoutSig) return; // sin cambios: no reconstruir
      layoutSig = sig;

      // Destruye los widgets actuales (timers, video, suscripciones).
      instances.forEach((i) => { try { i && i.destroy && i.destroy(); } catch {} });
      instances = [];

      const preset = PRESETS[layout.preset] || PRESETS.cuatro;
      app.style.gridTemplateColumns = preset.columns;
      app.style.gridTemplateRows = preset.rows;
      app.style.gridTemplateAreas = preset.areas;
      app.innerHTML = '';

      preset.slots.forEach((slot) => {
        const z = layout.zones && layout.zones[slot];
        const zoneEl = document.createElement('div');
        zoneEl.className = 'zone';
        zoneEl.style.gridArea = slot;
        app.appendChild(zoneEl);
        const factory = z && WIDGETS[z.widget];
        if (factory) {
          try { instances.push(factory(zoneEl, (z && z.config) || {})); }
          catch (e) { console.warn('Widget', z && z.widget, 'fallo:', e.message); }
        }
      });
    }

    // ------------------------- IPC -------------------------
    function asData(x) {
      if (typeof x === 'string') { try { return JSON.parse(x); } catch { return x; } }
      return x;
    }
    // Overlays de vinculacion segun el estado que envia el proceso principal:
    //   { status:'unclaimed', claimCode } -> codigo de vinculacion
    //   { status:'waiting' }              -> vinculada, esperando contenido
    //   null                              -> activa (sin overlay)
    function applyPairing(p) {
      const pair = document.getElementById('pairing-overlay');
      const wait = document.getElementById('waiting-overlay');
      const codeEl = document.getElementById('pairingCode');
      const status = p && p.status ? p.status : (p && p.claimCode ? 'unclaimed' : null);

      if (status === 'unclaimed' && p.claimCode) {
        // Agrupa de a 4 para leerlo facil (ej. "1234 5678").
        codeEl.textContent = String(p.claimCode).replace(/(.{4})(?=.)/g, '$1 ');
        pair.classList.add('show');
        wait.classList.remove('show');
      } else if (status === 'waiting') {
        wait.classList.add('show');
        pair.classList.remove('show');
      } else {
        pair.classList.remove('show');
        wait.classList.remove('show');
      }
    }

    if (window.signage) {
      if (window.signage.onLayout) window.signage.onLayout((l) => applyLayout(asData(l)));
      if (window.signage.onWeather) window.signage.onWeather((w) => applyWeather(asData(w)));
      if (window.signage.onPairing) window.signage.onPairing((p) => applyPairing(asData(p)));
      // Los canales playlist/images/settings ya no se usan para el render.
    }
  </script>
</body>
</html>
