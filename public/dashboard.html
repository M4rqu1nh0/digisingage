<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiSignage · Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span> DigiSignage</div>
    <div class="right">
      <span class="muted" id="clock"></span>
      <input type="file" id="fileInput" accept="video/*,.mp4,.webm,.ogg,.mov,.mkv" multiple hidden />
      <button class="btn ghost small" id="uploadBtn">⬆ Subir video</button>
      <button class="btn ghost small" id="addBtn">+ Dispositivo</button>
      <button class="btn ghost small" id="logoutBtn">Salir</button>
    </div>
  </div>

  <div class="container">
    <div class="toolbar">
      <div>
        <h2>Monitoreo y Gestión</h2>
        <div class="muted" id="summary">Cargando…</div>
      </div>
      <div class="muted">Se actualiza cada 15&nbsp;s · Verde = activo en últimos 3&nbsp;min</div>
    </div>

    <div id="dropzone" class="dropzone">
      <div class="dz-icon">⬆</div>
      <div>Arrastra y suelta videos aquí para subirlos</div>
      <small id="dzLimit" class="muted"></small>
    </div>

    <div id="uploadPanel" class="upload-panel"></div>

    <!-- Biblioteca de videos del servidor: selecciona uno o varios y asígnalos
         a un dispositivo con el botón "Añadir seleccionados" de su tarjeta. -->
    <details id="libraryBox" class="library" open>
      <summary>
        <span>📚 Biblioteca de videos (<span id="libCount">0</span>)</span>
        <span class="muted" id="libSelInfo">0 seleccionado(s)</span>
      </summary>
      <div class="lib-wrap">
        <table class="lib-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="libSelectAll" title="Seleccionar todos" /></th>
              <th>Nombre del archivo</th>
            </tr>
          </thead>
          <tbody id="libBody"></tbody>
        </table>
        <div class="lib-empty muted" id="libEmpty">Aún no hay videos. Sube alguno con «Subir video».</div>
      </div>
    </details>

    <div class="cards" id="cards"></div>
  </div>

  <script>
    const cardsEl = document.getElementById('cards');
    const summaryEl = document.getElementById('summary');
    const clockEl = document.getElementById('clock');

    let mediaCache = [];
    let maxUploadMB = 0; // 0 = aún no conocido (se obtiene del servidor)

    // Videos marcados en la biblioteca (para asignar a dispositivos).
    const selectedMedia = new Set();
    // Playlist en edición por dispositivo y marca de cambios sin guardar.
    const localPlaylists = {};   // deviceId -> [archivo, ...]
    const dirty = new Set();     // deviceIds con cambios sin guardar
    let draggingActive = false;  // pausa el auto-refresco mientras se arrastra

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function fmtFecha(iso) {
      if (!iso) return 'Nunca';
      const d = new Date(iso);
      const diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
      if (diffSec < 60) return `hace ${diffSec}s`;
      if (diffSec < 3600) return `hace ${Math.floor(diffSec / 60)} min`;
      return d.toLocaleString('es');
    }

    // ---------------------- Biblioteca de videos ----------------------
    function renderLibrary() {
      const body = document.getElementById('libBody');
      const empty = document.getElementById('libEmpty');
      document.getElementById('libCount').textContent = mediaCache.length;

      // Descarta de la selección los archivos que ya no existen.
      [...selectedMedia].forEach((f) => { if (!mediaCache.includes(f)) selectedMedia.delete(f); });

      if (!mediaCache.length) {
        body.innerHTML = '';
        empty.style.display = '';
        updateLibInfo();
        return;
      }
      empty.style.display = 'none';
      body.innerHTML = mediaCache.map((m) => `
        <tr data-file="${esc(m)}">
          <td class="col-check"><input type="checkbox" class="lib-check" ${selectedMedia.has(m) ? 'checked' : ''} /></td>
          <td class="lib-name">${esc(m)}</td>
        </tr>`).join('');
      updateLibInfo();
    }

    function updateLibInfo() {
      document.getElementById('libSelInfo').textContent = `${selectedMedia.size} seleccionado(s)`;
      const all = document.getElementById('libSelectAll');
      all.checked = mediaCache.length > 0 && selectedMedia.size === mediaCache.length;
      all.indeterminate = selectedMedia.size > 0 && selectedMedia.size < mediaCache.length;
    }

    document.getElementById('libBody').addEventListener('change', (e) => {
      if (!e.target.classList.contains('lib-check')) return;
      const file = e.target.closest('tr').dataset.file;
      if (e.target.checked) selectedMedia.add(file); else selectedMedia.delete(file);
      updateLibInfo();
    });

    document.getElementById('libSelectAll').addEventListener('change', (e) => {
      if (e.target.checked) mediaCache.forEach((m) => selectedMedia.add(m));
      else selectedMedia.clear();
      renderLibrary();
    });

    // ---------------------- Tarjetas de dispositivos ----------------------
    function plItemHTML(file) {
      return `<li class="pl-item" draggable="true" data-file="${esc(file)}">
        <span class="pl-handle" title="Arrastra para ordenar">⠿</span>
        <span class="pl-name">${esc(file)}</span>
        <button class="pl-dup" title="Duplicar (repetir este video)">⧉</button>
        <button class="pl-del" title="Quitar de la playlist">✕</button>
      </li>`;
    }

    function makeItem(file) {
      const tpl = document.createElement('template');
      tpl.innerHTML = plItemHTML(file).trim();
      return tpl.content.firstChild;
    }

    function cardHTML(d) {
      const statusCls = d.online ? 'online' : 'offline';
      const statusTxt = d.online ? 'En Línea' : 'Fuera de Línea';
      const items = (d._playlist || []).map(plItemHTML).join('');
      return `
        <div class="card" data-id="${esc(d.id)}">
          <div class="card-head">
            <div>
              <p class="dev-name">${esc(d.nombre)}</p>
              <div class="dev-meta">
                ID: ${esc(d.id)}<br>
                IP: ${esc(d.ip_actual || '—')} · Últ. conexión: ${fmtFecha(d.ultima_conexion)}
              </div>
            </div>
            <span class="status ${statusCls}"><span class="led"></span>${statusTxt}</span>
          </div>

          <label class="muted">Playlist (arrastra para ordenar · ⧉ duplicar · ✕ quitar)</label>
          <ul class="playlist-list" data-id="${esc(d.id)}">${items}</ul>
          <div class="pl-empty muted">Sin videos. Selecciónalos arriba y pulsa «Añadir seleccionados».</div>

          <div class="card-actions">
            <button class="btn ghost small addsel">➕ Añadir seleccionados</button>
            <button class="btn small save">Guardar orden</button>
            <button class="btn ghost small rename">Renombrar</button>
            <button class="btn danger small del">Eliminar</button>
            <span class="save-hint"></span>
          </div>
        </div>`;
    }

    function playlistFromDOM(list) {
      return [...list.querySelectorAll('.pl-item')].map((li) => li.dataset.file);
    }

    function toggleEmpty(list) {
      const empty = list.closest('.card').querySelector('.pl-empty');
      if (empty) empty.style.display = list.children.length ? 'none' : '';
    }

    // Sincroniza el estado local desde el DOM y marca el dispositivo como editado.
    function syncLocal(id, list) {
      localPlaylists[id] = playlistFromDOM(list);
      dirty.add(id);
      toggleEmpty(list);
    }

    function getDragAfterElement(list, y) {
      const items = [...list.querySelectorAll('.pl-item:not(.dragging)')];
      return items.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) return { offset, element: child };
        return closest;
      }, { offset: -Infinity, element: null }).element;
    }

    function attachDnD(list) {
      list.addEventListener('dragstart', (e) => {
        const li = e.target.closest('.pl-item');
        if (!li) return;
        draggingActive = true;
        li.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', li.dataset.file); } catch {}
      });
      list.addEventListener('dragend', (e) => {
        const li = e.target.closest('.pl-item');
        if (li) li.classList.remove('dragging');
        draggingActive = false;
        syncLocal(list.dataset.id, list);
      });
      list.addEventListener('dragover', (e) => {
        e.preventDefault();
        const dragging = list.querySelector('.pl-item.dragging');
        if (!dragging) return;
        const after = getDragAfterElement(list, e.clientY);
        if (after == null) list.appendChild(dragging);
        else list.insertBefore(dragging, after);
      });
    }

    async function loadMedia() {
      try {
        const res = await fetch('/api/admin/media');
        if (res.ok) {
          const data = await res.json();
          mediaCache = data.media || [];
          maxUploadMB = data.maxUploadMB || 0;
          const lbl = document.getElementById('dzLimit');
          if (lbl) lbl.textContent = maxUploadMB
            ? `Formatos: mp4, webm, ogg, mov, mkv · Máx. ${maxUploadMB} MB por archivo`
            : 'Formatos: mp4, webm, ogg, mov, mkv';
          renderLibrary();
        }
      } catch {}
    }

    async function loadDevices() {
      if (draggingActive) return; // no re-renderizar en mitad de un arrastre
      const res = await fetch('/api/admin/devices');
      if (res.status === 401) { location.href = '/login.html'; return; }
      const { devices } = await res.json();

      const online = devices.filter((d) => d.online).length;
      summaryEl.textContent = `${devices.length} dispositivo(s) · ${online} en línea`;

      // Limpia estado local de dispositivos que ya no existen.
      const ids = new Set(devices.map((d) => d.id));
      Object.keys(localPlaylists).forEach((k) => {
        if (!ids.has(k)) { delete localPlaylists[k]; dirty.delete(k); }
      });

      // Para cada dispositivo: si tiene cambios sin guardar, conserva la edición
      // local; si no, refresca desde el servidor.
      devices.forEach((d) => {
        if (!dirty.has(d.id)) localPlaylists[d.id] = (d.playlist || []).slice();
        d._playlist = localPlaylists[d.id] || [];
      });

      if (!devices.length) {
        cardsEl.innerHTML = `<div class="empty">No hay dispositivos registrados.<br>
          Aparecerán automáticamente cuando un cliente envíe su primer heartbeat,
          o créalos con "+ Dispositivo".</div>`;
        return;
      }

      cardsEl.innerHTML = devices.map(cardHTML).join('');
      cardsEl.querySelectorAll('.playlist-list').forEach((list) => {
        attachDnD(list);
        toggleEmpty(list);
      });
    }

    // ---- Eventos delegados de las tarjetas ----
    cardsEl.addEventListener('click', async (e) => {
      const card = e.target.closest('.card');
      if (!card) return;
      const id = card.dataset.id;
      const list = card.querySelector('.playlist-list');
      const hint = card.querySelector('.save-hint');

      // Quitar un video de la playlist.
      if (e.target.classList.contains('pl-del')) {
        e.target.closest('.pl-item').remove();
        syncLocal(id, list);
        return;
      }

      // Duplicar un video (insertar una copia justo debajo) para poder repetirlo,
      // p. ej. intercalar un spot entre otros videos. Luego se arrastra a su sitio.
      if (e.target.classList.contains('pl-dup')) {
        const li = e.target.closest('.pl-item');
        li.after(makeItem(li.dataset.file));
        syncLocal(id, list);
        return;
      }

      // Añadir los videos seleccionados en la biblioteca a esta playlist.
      if (e.target.classList.contains('addsel')) {
        if (!selectedMedia.size) {
          hint.textContent = 'Marca videos en la biblioteca primero';
          hint.className = 'save-hint';
          setTimeout(() => (hint.textContent = ''), 2500);
          return;
        }
        const present = new Set(playlistFromDOM(list));
        let added = 0;
        selectedMedia.forEach((file) => {
          if (!present.has(file)) { list.appendChild(makeItem(file)); added++; }
        });
        if (added) syncLocal(id, list);
        hint.textContent = added ? `+${added} añadido(s) · Guarda para aplicar` : 'Ya estaban en la lista';
        hint.className = 'save-hint';
        setTimeout(() => (hint.textContent = ''), 2500);
        return;
      }

      if (e.target.classList.contains('save')) {
        const videos = playlistFromDOM(list);
        hint.textContent = 'Guardando…';
        hint.className = 'save-hint';
        const res = await fetch('/api/admin/playlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ deviceId: id, videos }),
        });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          localPlaylists[id] = Array.isArray(data.playlist) ? data.playlist : videos;
          dirty.delete(id);
          hint.textContent = '✔ Guardado';
          hint.className = 'save-hint ok';
        } else {
          hint.textContent = '✖ Error';
          hint.className = 'save-hint err';
        }
        setTimeout(() => (hint.textContent = ''), 2500);
        return;
      }

      if (e.target.classList.contains('rename')) {
        const nombre = prompt('Nuevo nombre del dispositivo:');
        if (nombre) {
          await fetch('/api/admin/device', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ deviceId: id, nombre }),
          });
          loadDevices();
        }
        return;
      }

      if (e.target.classList.contains('del')) {
        if (confirm('¿Eliminar este dispositivo y su playlist?')) {
          await fetch('/api/admin/device/' + encodeURIComponent(id), { method: 'DELETE' });
          dirty.delete(id);
          delete localPlaylists[id];
          loadDevices();
        }
        return;
      }
    });

    document.getElementById('addBtn').addEventListener('click', async () => {
      const deviceId = prompt('ID único del dispositivo (igual al config del cliente):');
      if (!deviceId) return;
      const nombre = prompt('Nombre descriptivo (ej. "Pantalla Recepción"):') || '';
      await fetch('/api/admin/device', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId: deviceId.trim(), nombre: nombre.trim() }),
      });
      loadDevices();
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/login.html';
    });

    // ---- Subida de videos con indicador de progreso (%) ----
    const uploadPanel = document.getElementById('uploadPanel');
    const fileInput = document.getElementById('fileInput');

    function humanSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
      if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
      return (bytes / 1073741824).toFixed(2) + ' GB';
    }

    // Sube un archivo via XHR para poder leer el progreso de carga.
    function uploadOne(file) {
      return new Promise((resolve) => {
        const row = document.createElement('div');
        row.className = 'up-row';
        row.innerHTML = `
          <div class="up-info">
            <span class="up-name"></span>
            <span class="up-pct">0%</span>
          </div>
          <div class="up-track"><div class="up-fill"></div></div>`;
        row.querySelector('.up-name').textContent = `${file.name} (${humanSize(file.size)})`;
        uploadPanel.prepend(row);

        const fill = row.querySelector('.up-fill');
        const pct = row.querySelector('.up-pct');

        // Validación previa de tamaño (evita subir en vano si excede el límite).
        if (maxUploadMB && file.size > maxUploadMB * 1024 * 1024) {
          pct.textContent = `✖ Supera ${maxUploadMB} MB`;
          row.classList.add('err');
          setTimeout(() => row.remove(), 6000);
          return resolve();
        }

        const form = new FormData();
        form.append('video', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/admin/media');
        xhr.withCredentials = true; // envia la cookie de sesion

        xhr.upload.addEventListener('progress', (e) => {
          if (!e.lengthComputable) return;
          const p = Math.round((e.loaded / e.total) * 100);
          fill.style.width = p + '%';
          pct.textContent = p + '%';
        });

        xhr.addEventListener('load', () => {
          let serverMsg = '';
          try { serverMsg = JSON.parse(xhr.responseText).error || ''; } catch {}
          if (xhr.status >= 200 && xhr.status < 300) {
            fill.style.width = '100%';
            pct.textContent = '✔ Listo';
            row.classList.add('ok');
          } else if (xhr.status === 401) {
            pct.textContent = '✖ Sesión expirada';
            row.classList.add('err');
            setTimeout(() => (location.href = '/login.html'), 1500);
          } else {
            // Incluye el caso 413 (supera el límite) con el mensaje del servidor.
            pct.textContent = '✖ ' + (serverMsg || 'Error');
            row.classList.add('err');
          }
          setTimeout(() => row.remove(), 6000);
          resolve();
        });

        xhr.addEventListener('error', () => {
          pct.textContent = '✖ Error de red';
          row.classList.add('err');
          setTimeout(() => row.remove(), 5000);
          resolve();
        });

        xhr.send(form);
      });
    }

    // Sube los archivos en serie y refresca el catálogo al terminar.
    async function uploadFiles(files) {
      for (const f of files) await uploadOne(f);
      await loadMedia();
      await loadDevices();
    }

    document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) uploadFiles(fileInput.files);
      fileInput.value = ''; // permite volver a subir el mismo archivo
    });

    // ---- Drag & drop de subida ----
    const dropzone = document.getElementById('dropzone');
    const VIDEO_RE = /\.(mp4|webm|ogg|mov|mkv)$/i;

    function onlyVideos(fileList) {
      return [...fileList].filter((f) => VIDEO_RE.test(f.name) || (f.type || '').startsWith('video/'));
    }

    // La zona dedicada también permite hacer clic para abrir el selector.
    dropzone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      })
    );
    ['dragleave', 'dragend', 'drop'].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      })
    );
    dropzone.addEventListener('drop', (e) => {
      const files = onlyVideos(e.dataTransfer.files);
      if (files.length) uploadFiles(files);
    });

    // Evita que el navegador abra el archivo si se suelta fuera de la zona.
    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => e.preventDefault());

    function tick() { clockEl.textContent = new Date().toLocaleTimeString('es'); }
    setInterval(tick, 1000); tick();

    // Carga inicial + auto-refresco del monitoreo.
    (async () => {
      await loadMedia();
      await loadDevices();
      setInterval(loadDevices, 15000);
    })();
  </script>
</body>
</html>
